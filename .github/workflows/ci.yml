name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily regression at midnight

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8 mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: |
          ruff check framework/ functions/ tests/

      - name: Flake8 lint
        run: |
          flake8 framework/ functions/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Type check with mypy
        run: |
          mypy framework/ --ignore-missing-imports --install-types --non-interactive || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=framework \
            --cov=functions \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            -W ignore::DeprecationWarning

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
        if: always()

  smoke:
    name: Fixture Smoke Test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Create test directories
        run: |
          mkdir -p logs tmp reports config

      - name: List available fixtures
        run: |
          echo "Available fixtures:"
          ls -la fixtures/

      - name: Verify framework imports
        run: |
          python -c "
from framework.core.status_codes import StatusCode
from framework.core.result_store import ResultStore, TestResult
from framework.core.function_runner import FunctionRunner
from framework.core.case_runner import CaseRunner
from framework.core.fixture_runner import FixtureRunner
from framework.core.scheduler import Scheduler
from framework.platform.linux_adapter import LinuxAdapter
from framework.logging.logger import Logger
from framework.logging.report_generator import ReportGenerator
from framework.monitoring.system_monitor import SystemMonitor
from framework.dashboard.cli_dashboard import CLIDashboard
print('All framework modules imported successfully!')
"

      - name: Run unit smoke test
        run: |
          pytest tests/test_status_codes.py tests/test_result_store.py -v
